<style>

    }
</style>
 <script>
    function mover(elemento,inicio,fim,passo,callback){
        const novoInicio = inicio - passo
        if(novoInicio >= fim){
            elemento.style.left = novoInicio +'px'
            setTimeout(()=> mover(elemento,novoInicio,fim,passo,callback),7)
        }else{
            callback()
        }
    }
    //const p = document.querySelector('[wm-slider] > p')
    //p.style.display = 'block'
    //mover(p,1500,-520,5,()=> console.log('terminou'))
    function slider (){
        const elementos = document.querySelectorAll('[wm-slider] > p')
        const sliders = Array.from(elementos)
        exibirSliders(sliders,sliders[0])
    }
    function exibirSliders(sliders,slider){
        slider.style.display = 'block'
        const inicio = innerWidth
        const fim = -slider.clientWidth
        slider.style.left = inicio + 'px'
        mover(slider,inicio,fim,5,()=>{
            slider.style.display = 'none'
            exibirSliders(sliders,getProximo(sliders,slider))

        })
    }
    function getProximo(lista,atual){
        const i = lista.indexOf(atual) + 1
        return i < lista.length ? lista[i]: lista[0]
    }
    slider()
    

 </script>
